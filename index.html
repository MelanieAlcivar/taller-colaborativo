<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Frases Motivacionales - Chistes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body class="light">
  <div class="container">
    <h1>💡 Frases Motivacionales - Chistes</h1>

    <!-- Boton para mostrar frase -->
    <button id="btn-frase">Mostrar Frase</button>
    
    <!-- Contenedor de frase -->
    <div id="frase" class="frase">Haz clic en el botón para ver una frase.</div>

    <!-- Contador -->
    <p id="contador">Frases mostradas: 0</p>

    <!-- Seccion para agregar frases -->
    <div class="agregar-frase">
      <input type="text" id="nueva-frase" placeholder="Escribe tu frase aquí...">
      <button id="btn-agregar">Agregar Frase</button>
    </div>

    <!-- Boton para alternar tema -->
    <button id="btn-tema" class="tema">🌙 Modo Oscuro</button>
  </div>
</body>
</html>
